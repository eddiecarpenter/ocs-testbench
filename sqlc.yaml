version: "2"

# sqlc reads the authoritative schema from the up migrations and writes
# typed Go bindings into internal/store/sqlc. The store wrapper layer
# (internal/store/store.go) consumes the generated package.
#
# query_parameter_limit: 4 mirrors the charging-domain configuration —
# queries with more than four parameters generate a struct argument so
# call sites stay readable.

sql:
  - engine: postgresql
    schema: db/migrations/*.up.sql
    queries: internal/store/queries
    gen:
      go:
        package: sqlc
        out: internal/store/sqlc
        sql_package: pgx/v5
        emit_interface: true
        emit_json_tags: false
        emit_prepared_queries: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: false
        query_parameter_limit: 4
