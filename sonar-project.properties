# SonarCloud / SonarQube scanner config.
#
# Activated by the Quality workflow at .github/workflows/quality.yml.
# Run via SonarSource/sonarcloud-github-action which honours these
# values; on PRs the action also passes branch / PR-decoration metadata
# from the workflow context automatically.
#
# Repo-side prerequisites (one-off):
#   - SonarCloud project created with the keys below.
#   - SONAR_TOKEN secret added to repo (Settings → Secrets and variables
#     → Actions). Generate via SonarCloud → My Account → Security.
#
# The Quality workflow uploads coverage from both lanes:
#   - Go:    coverage.out (Go native format; sonar reads it directly)
#   - Web:   web/coverage/lcov.info (lcov from vitest --coverage)

sonar.projectKey=eddiecarpenter_ocs-testbench
sonar.organization=eddiecarpenter

# Display name + visible version on the SonarCloud project page.
sonar.projectName=ocs-testbench
sonar.projectVersion=0.1.0

# Source roots. Leaving sonar.sources unset would default to "." and
# scan everything; explicit roots keep node_modules / dist / generated
# code out of the analysis surface.
sonar.sources=internal,cmd,web/src,api
sonar.tests=internal,cmd,web/src

# File patterns excluded from analysis (and from coverage requirements
# below — generated code shouldn't drag the coverage % down).
sonar.exclusions=\
  **/node_modules/**,\
  web/dist/**,\
  web/coverage/**,\
  web/storybook-static/**,\
  internal/store/sqlc/**,\
  web/src/api/schema.d.ts,\
  **/*.generated.go,\
  .ai/**

# Test file patterns — Sonar treats these as tests (i.e. doesn't expect
# them to have coverage and tracks test counts separately).
sonar.test.inclusions=\
  **/*_test.go,\
  **/*.test.ts,\
  **/*.test.tsx

# Coverage paths — the Quality workflow generates these before the
# scan runs. Multiple Go coverage files merge if listed.
sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

# Coverage exclusions (separate from analysis exclusions above) — files
# we ship but don't expect to cover with tests, e.g. main wiring,
# embed-only files, fixtures. These count toward analysis but not the
# coverage ratio.
sonar.coverage.exclusions=\
  cmd/**/main.go,\
  cmd/**/devmode*.go,\
  web/src/main.tsx,\
  web/src/mocks/**,\
  web/src/**/*.stories.tsx,\
  web/embed.go,\
  internal/store/sqlc/**

# Source encoding — explicit so multi-byte chars in fixtures (the
# OCS Testbench docstrings have a few em-dashes) don't get flagged
# as encoding issues.
sonar.sourceEncoding=UTF-8

# Pull-request decoration: the Sonar GitHub action sets these
# automatically when invoked on `pull_request` events; left
# unconfigured here so they're picked up from the workflow context.
